<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宁静海洋 - 启动页</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animation.css">
</head>
<body>
    <div class="container">
        <div class="content-wrapper">
            <!-- 信息展示层（顶部） -->
            <div class="info-section">
                <div class="date" id="date">2025年06月28日 星期六</div>
                <div class="time" id="time">12:48:11</div>
            </div>

            <!-- 交互层（中央搜索区） -->
            <div class="search-section">
                <div class="search-box">
                    <input type="text" placeholder="输入关键词搜索..." id="search-input">
                    <button class="search-btn" id="search-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                        </svg>
                    </button>
                </div>
                <div class="search-engines">
                    <button class="engine-btn active" data-engine="google">Google</button>
                    <button class="engine-btn" data-engine="baidu">百度</button>
                    <button class="engine-btn" data-engine="bing">必应</button>
                    <button class="engine-btn" data-engine="sm">神马</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/animation.js"></script>
</body>
</html>
