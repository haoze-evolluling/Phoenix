<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix - 浏览器主页</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 背景装饰元素 -->
        <div class="background-decoration">
            <div class="glass-orb orb-1"></div>
            <div class="glass-orb orb-2"></div>
            <div class="glass-orb orb-3"></div>
        </div>

        <!-- 主要内容区域 -->
        <main class="main-content">
            <!-- 数字时钟 -->
            <div class="clock-container">
                <div class="time-display" id="timeDisplay">
                    <span class="hours" id="hours">00</span>
                    <span class="separator">:</span>
                    <span class="minutes" id="minutes">00</span>
                    <span class="seconds" id="seconds">00</span>
                </div>
                <div class="date-display" id="dateDisplay">
                    <span class="date" id="date">2024年1月1日</span>
                    <span class="weekday" id="weekday">星期一</span>
                </div>
            </div>

            <!-- 搜索区域 -->
            <div class="search-container">
                <!-- 搜索引擎选择器 -->
                <div class="search-engine-selector">
                    <button class="engine-btn active" data-engine="google" title="Google">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                    </button>
                    <button class="engine-btn" data-engine="baidu" title="百度">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path fill="#2932E1" d="M6.217 12.486c1.964-1.531 1.964-4.008 0-5.539-1.964-1.531-5.148-1.531-7.112 0s-1.964 4.008 0 5.539c1.964 1.531 5.148 1.531 7.112 0zm11.566 0c1.964-1.531 1.964-4.008 0-5.539-1.964-1.531-5.148-1.531-7.112 0s-1.964 4.008 0 5.539c1.964 1.531 5.148 1.531 7.112 0z"/>
                        </svg>
                    </button>
                    <button class="engine-btn" data-engine="bing" title="Bing">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path fill="#00BCF2" d="M5.71 3L3 4.29v11.86l2.71 1.29L12 21l6.29-3.57L21 16.14V7.86L18.29 6.43L12 3L5.71 3zm6.29 2.57l5.14 2.57v8.57L12 19.29l-5.14-2.57V8.14L12 5.57z"/>
                        </svg>
                    </button>
                </div>

                <!-- 搜索框 -->
                <div class="search-box">
                    <input type="text" 
                           id="searchInput" 
                           placeholder="搜索..." 
                           autocomplete="off"
                           spellcheck="false">
                    <button class="search-btn" id="searchBtn" type="button">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path fill="currentColor" d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>

        <!-- 底部引言 -->
        <footer class="footer">
            <p class="quote">「 须知少时凌云志，曾许人间第一流 」</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
