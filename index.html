<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>haoze的导航</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <main class="main">
            <div class="search-section">
                <div class="time-display" id="timeDisplay">
                    <div class="time">00:00:00</div>
                    <div class="date">星期一, 2024年1月1日</div>
                </div>
                
                <div class="search-engine-selector">
                    <div class="engine-options">
                        <button class="engine-btn active" data-engine="google">
                            <i class="fab fa-google"></i>
                            <span>Google</span>
                        </button>
                        <button class="engine-btn" data-engine="baidu">
                            <i class="fas fa-search"></i>
                            <span>百度</span>
                        </button>
                        <button class="engine-btn" data-engine="bing">
                            <i class="fab fa-microsoft"></i>
                            <span>Bing</span>
                        </button>

                    </div>
                </div>

                <div class="search-box">
                    <div class="search-input-container">
                        <input 
                            type="text" 
                            class="search-input" 
                            id="searchInput" 
                            placeholder="输入搜索内容..."
                            autocomplete="off"
                        >
                        <button class="search-button" id="searchButton">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                    
                    <div class="search-suggestions" id="searchSuggestions" style="display: none;">
                        <div class="suggestion-item">加载建议中...</div>
                    </div>
                </div>

                <div class="quick-links" id="quickLinks">
                    <div class="quick-link-item" data-index="0">
                        <button class="quick-link-btn" title="GitHub">
                            <i class="fab fa-github"></i>
                            <span>GitHub</span>
                        </button>
                    </div>
                    <div class="quick-link-item" data-index="1">
                        <button class="quick-link-btn" title="Bilibili">
                            <i class="fas fa-play-circle"></i>
                            <span>B站</span>
                        </button>
                    </div>
                    <div class="quick-link-item" data-index="2">
                        <button class="quick-link-btn" title="知乎">
                            <i class="fas fa-question-circle"></i>
                            <span>知乎</span>
                        </button>
                    </div>
                    <div class="quick-link-item" data-index="3">
                        <button class="quick-link-btn" title="YouTube">
                            <i class="fab fa-youtube"></i>
                            <span>YouTube</span>
                        </button>
                    </div>
                </div>

            </div>
        </main>

        <footer class="footer">
            <div class="settings">
                <button class="settings-btn" id="settingsBtn">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
