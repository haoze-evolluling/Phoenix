<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix - 简约搜索主页</title>
    <link rel="icon" href="webicon.png" type="webicon">
    <link rel="stylesheet" href="css/main.css">
    <style>
        /* 确保在页面加载过程中过渡效果已经准备好 */
        body::before {
            will-change: backdrop-filter;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            perspective: 1000;
            -webkit-perspective: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 数字时钟 -->
        <div class="clock" id="clock"></div>
        
        <!-- 中心搜索框 -->
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索...">
                <button id="search-button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>
            
            <!-- 搜索引擎选择菜单 -->
            <div class="search-engines">
                <div class="engine" data-engine="google">
                    <img src="search_engine_icon/google_icon.png" alt="Google">
                </div>
                <div class="engine" data-engine="bing">
                    <img src="search_engine_icon/bing_icon.png" alt="Bing">
                </div>
                <div class="engine" data-engine="baidu">
                    <img src="search_engine_icon/baidu_logo.png" alt="Baidu">
                </div>
            </div>
        </div>
    </div>
    
    <!-- 底部信息 -->
    <footer>
        <p class="quote">「 愿为逝者哀哭，泣下如雨，充盈渡川，如潮涌至，领你归乡。 」</p>
    </footer>

    <!-- 传统的JS文件引入方式 -->
    <script src="js/ui.js"></script>
    <script src="js/clock.js"></script>
    <script src="js/search.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
