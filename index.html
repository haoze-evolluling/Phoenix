<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新标签页</title>
    <link rel="icon" href="web_icon.png" type="image/png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <!-- 时间显示区域 -->
        <div class="time-section">
            <div class="time-display" id="timeDisplay">
                <div class="time" id="currentTime">00:00:00</div>
                <div class="date" id="currentDate">2024年1月1日 星期一</div>
            </div>
        </div>

        <!-- 搜索区域 -->
        <div class="search-section">
            <div class="search-container">
                <!-- 搜索引擎选择器 -->
                <div class="search-engine-selector">
                    <button class="engine-btn active" data-engine="baidu">百度</button>
                    <button class="engine-btn" data-engine="google">谷歌</button>
                    <button class="engine-btn" data-engine="bing">必应</button>
                </div>

                <!-- 搜索框 -->
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="请输入搜索关键词..." autocomplete="off">
                    <button class="search-btn" id="searchBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- 快捷链接区域（可选） -->
        <div class="shortcuts-section">
            <div class="shortcuts-container">
                <a href="https://github.com" class="shortcut-item" target="_blank">
                    <span class="shortcut-icon">📚</span>
                    <span class="shortcut-text">GitHub</span>
                </a>
                <a href="https://copilot.microsoft.com/" class="shortcut-item" target="_blank">
                    <span class="shortcut-icon">💡</span>
                    <span class="shortcut-text">copilot</span>
                </a>
                <a href="https://www.kkj.cn/" class="shortcut-item" target="_blank">
                    <span class="shortcut-icon">📖</span>
                    <span class="shortcut-text">快科技</span>
                </a>
                <a href="https://www.youtube.com" class="shortcut-item" target="_blank">
                    <span class="shortcut-icon">🎥</span>
                    <span class="shortcut-text">YouTube</span>
                </a>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
