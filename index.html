<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新标签页</title>
    <link rel="icon" href="web_icon.png" type="image/png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <!-- 时间显示区域 -->
        <div class="time-section">
            <div class="time-display" id="timeDisplay">
                <div class="time" id="currentTime">00:00:00</div>
                <div class="date" id="currentDate">2024年1月1日 星期一</div>
            </div>
        </div>

        <!-- 搜索区域 -->
        <div class="search-section">
            <div class="search-container">
                <!-- 搜索引擎选择器 -->
                <div class="search-engine-selector">
                    <button class="engine-btn active" data-engine="baidu">百度</button>
                    <button class="engine-btn" data-engine="google">谷歌</button>
                    <button class="engine-btn" data-engine="bing">必应</button>
                </div>

                <!-- 搜索框 -->
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="请输入搜索关键词..." autocomplete="off">
                    <button class="search-btn" id="searchBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- 快捷链接区域（可选） -->
        <div class="shortcuts-section">
            <div class="shortcuts-container">
                <!-- 快捷链接将由JavaScript动态生成 -->
            </div>
        </div>
    </div>

    <!-- 右键菜单 -->
    <div id="contextMenu" class="context-menu">
        <div class="context-menu-item" id="editShortcut">
            <span class="context-menu-icon">✏️</span>
            <span class="context-menu-text">编辑</span>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑快捷链接</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="editName">网站名称：</label>
                    <input type="text" id="editName" placeholder="请输入网站名称">
                </div>
                <div class="form-group">
                    <label for="editUrl">网站链接：</label>
                    <input type="url" id="editUrl" placeholder="请输入网站链接">
                    <div class="url-preview" id="urlPreview"></div>
                </div>
                <div class="form-group">
                    <label for="editIcon">图标：</label>
                    <input type="text" id="editIcon" placeholder="请输入emoji图标">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" id="cancelEdit">取消</button>
                <button class="btn btn-save" id="saveEdit">保存</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
