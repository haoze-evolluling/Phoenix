<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="background-container">
        <div class="background-layer base"></div>
        <div class="background-layer overlay"></div>
    </div>
    <div class="container">
        <main class="main">
            <div class="content-section">
                <div class="time-display" id="timeDisplay">
                    <div class="time">00:00:00</div>
                    <div class="date">星期一, 2024年1月1日</div>
                </div>

                <div class="quick-links" id="quickLinks">
                    <div class="quick-link-item" data-index="0">
                        <button class="quick-link-btn" title="GitHub">
                            <i class="fab fa-github"></i>
                            <span>GitHub</span>
                        </button>
                    </div>
                    <div class="quick-link-item" data-index="1">
                        <button class="quick-link-btn" title="Bilibili">
                            <i class="fas fa-play-circle"></i>
                            <span>B站</span>
                        </button>
                    </div>
                    <div class="quick-link-item" data-index="2">
                        <button class="quick-link-btn" title="知乎">
                            <i class="fas fa-question-circle"></i>
                            <span>知乎</span>
                        </button>
                    </div>
                    <div class="quick-link-item" data-index="3">
                        <button class="quick-link-btn" title="YouTube">
                            <i class="fab fa-youtube"></i>
                            <span>YouTube</span>
                        </button>
                    </div>
                    <div class="quick-link-item" data-index="4">
                        <button class="quick-link-btn" title="微信">
                            <i class="fab fa-weixin"></i>
                            <span>微信</span>
                        </button>
                    </div>
                    <div class="quick-link-item" data-index="5">
                        <button class="quick-link-btn" title="微博">
                            <i class="fab fa-weibo"></i>
                            <span>微博</span>
                        </button>
                    </div>
                    <div class="quick-link-item" data-index="6">
                        <button class="quick-link-btn" title="淘宝">
                            <i class="fas fa-shopping-cart"></i>
                            <span>淘宝</span>
                        </button>
                    </div>
                    <div class="quick-link-item" data-index="7">
                        <button class="quick-link-btn" title="百度网盘">
                            <i class="fas fa-cloud"></i>
                            <span>百度网盘</span>
                        </button>
                    </div>
                </div>

            </div>
        </main>

        <footer class="footer">
            <div class="settings">
                <button class="settings-btn" id="settingsBtn">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </footer>
    </div>

    <!-- 名句小彩蛋 -->
    <div class="quote-modal" id="quoteModal" style="display: none;">
        <div class="quote-modal-content">
            <div class="quote-text" id="quoteText"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
